<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Lista de Tarefas</title>
</head>
<body>

<header class="header">
    <h1>Edufor</h1>
    <h2>—Lista de Tarefas—</h2>
</header>

<main class="main-container">

    <section class="ToDo-Container">
        <div class="input-wrapper">
            <input type="text" id="task-input" placeholder="Digite sua tarefa aqui..." class="input-tarefa" maxlength="450">
            <span class="char-counter" id="char-counter">0/450</span>
        </div>
        <button class="add-task-button">+</button>
    </section>

    <section class="progresso-container">
        <div class="progresso-trilho">
            <div class="progresso-fill" id="progresso-fill"></div>
        </div>
        <span class="progresso-texto" id="progresso-texto">0/0 concluídas</span>
    </section>

    <section class="lista-tarefas" id="task-list">
    </section>

</main>

<script src="index.js"></script>
</body>
</html>
